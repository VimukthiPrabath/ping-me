services:
  # 1. Next.js Dashboard
  - type: web
    name: pingme-dashboard
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: REDIS_URL
        sync: false

  # 2. Python Ping Worker (දැන් මේකත් Web Service එකක්)
  - type: web
    name: pingme-worker
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: worker/Dockerfile
    envVars:
      - key: REDIS_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

databases:
  - name: pingme-redis
    plan: free
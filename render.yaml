services:
  # Next.js Frontend
  - type: web
    name: pingme-frontend
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: Dockerfile 
    envVars:
      - key: REDIS_URL
        fromService:
          name: pingme-redis
          type: redis
          property: connectionString

  # Python Worker
  - type: worker
    name: pingme-worker
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: worker/Dockerfile 
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        value: "8725301793:AAFqG8jDJLjolv9-Kn6KEkoqySxb10Z0oyM"
      - key: TELEGRAM_CHAT_ID
        value: "1336678820"
      - key: REDIS_URL
        fromService:
          name: pingme-redis
          type: redis
          property: connectionString

# Redis Database
databases:
  - name: pingme-redis
    plan: free
    ipAllowList: [] 
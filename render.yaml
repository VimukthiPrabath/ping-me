services:
  # 1. Next.js Dashboard (Frontend)
  - type: web
    name: pingme-dashboard
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: REDIS_URL
        fromService:
          name: pingme-redis
          type: redis
          property: connectionString

  # 2. Python Ping Worker (Backend)
  - type: worker
    name: pingme-worker
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: worker/Dockerfile
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false # මේක අපි Blueprint එක රන් කරද්දී දෙමු
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: REDIS_URL
        fromService:
          name: pingme-redis
          type: redis
          property: connectionString

# 3. Render Redis Database
databases:
  - name: pingme-redis
    plan: free
    ipAllowList: []